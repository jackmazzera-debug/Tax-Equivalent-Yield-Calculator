name: Refresh Fund Yields

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  update-yields:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Fetch yields and write data.json
        run: python fetch_yields.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: refresh fund yields $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
